name: Android CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4096m -Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew test

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload debug APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk

  deploy-to-app-chance:
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Make gradlew executable
        run: chmod +x gradlew

      # ============================================================
      # AUTO-GENERATE A DEBUG KEYSTORE (fixed -keyalg RSA)
      # ============================================================
      - name: Generate debug keystore
        run: |
          mkdir -p ~/.android
          keytool -genkey -v -keystore ~/.android/debug.keystore \
            -storepass android -alias androiddebugkey \
            -keypass android -dname "CN=Android Debug,O=Android,C=US" \
            -validity 10000 -keyalg RSA
          echo "DEBUG_KEYSTORE_PATH=~/.android/debug.keystore" >> $GITHUB_ENV

      # ============================================================
      # BUILD RELEASE APK SIGNED WITH THE AUTO-GENERATED DEBUG KEYSTORE
      # ============================================================
      - name: Build signed release APK
        run: ./gradlew assembleRelease
        env:
          STORE_FILE: ${{ env.DEBUG_KEYSTORE_PATH }}
          STORE_PASSWORD: android
          KEY_ALIAS: androiddebugkey
          KEY_PASSWORD: android

      # ============================================================
      # UPLOAD TO GOOGLE PLAY INTERNAL APP SHARING (APP CHANCE)
      # ============================================================
      - name: Upload to Google Play Internal App Sharing
        uses: r0adkll/upload-google-play@v1.1.5
        with:
          serviceAccountJson: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          packageName: your.gni.app.package.name
          releaseFiles: app/build/outputs/apk/release/*.apk
          track: internal
          whatsNew: "Auto-built from main branch - Internal sharing"